    <!--
      Type system: Playfair Display + DM Sans
      ─────────────────────────────────────────────────────────────────
      Playfair Display — high-contrast transitional serif. The hairline/stem
      contrast and generous x-height read editorial and architectural at any
      scale. Used by Aman, Wallpaper*, premium hospitality at large display
      sizes. Light (300) weight gives the restraint Agape and Falper achieve
      with their custom serifs. Regular (400) provides the structured mid-range.

      DM Sans — a geometric sans with a slightly humanist skeleton. Optical
      sizing corrections built in; reads cleanly at 12px and 18px equally.
      Avoids the coldness of Helvetica Neue / Inter while staying far from
      startup territory. Used by premium editorial and design-led brands.
      Weights: 300 (body light), 400 (body regular), 500 (UI medium).
      ─────────────────────────────────────────────────────────────────
    -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
